# Spark Configuration
spark.master                     spark://spark-master:7077
spark.eventLog.enabled           true
spark.eventLog.dir               /opt/spark/logs
spark.history.fs.logDirectory    /opt/spark/logs

# Iceberg Configuration
spark.sql.extensions             org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.iceberg         org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type    rest
spark.sql.catalog.iceberg.uri     http://iceberg-rest:8181

# Iceberg Table Format Version 2 (default in 1.9.2)
spark.sql.catalog.iceberg.table-default.format-version    2
spark.sql.catalog.iceberg.table-default.delete-mode       merge-on-read
spark.sql.catalog.iceberg.table-default.update-mode       merge-on-read

# Gravitino Integration
spark.sql.catalog.gravitino       org.apache.gravitino.spark.connector.catalog.GravitinoCatalogManager
spark.sql.catalog.gravitino.gravitino.uri    http://gravitino:8090
spark.sql.catalog.gravitino.gravitino.metalake    lakehouse

# Default catalog
spark.sql.defaultCatalog         iceberg

# S3/MinIO Configuration
spark.hadoop.fs.s3a.endpoint            http://minio:9000
spark.hadoop.fs.s3a.access.key          minioadmin
spark.hadoop.fs.s3a.secret.key          minioadmin123
spark.hadoop.fs.s3a.path.style.access   true
spark.hadoop.fs.s3a.impl                org.apache.hadoop.fs.s3a.S3AFileSystem

# Kafka Configuration
spark.sql.streaming.kafka.bootstrap.servers    kafka-broker-1:29092,kafka-broker-2:29094

# Performance tuning
spark.serializer                 org.apache.spark.serializer.KryoSerializer
spark.sql.adaptive.enabled       true
spark.sql.adaptive.coalescePartitions.enabled true