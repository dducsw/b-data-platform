# Gravitino Configuration
gravitino.server.webserver.host = 0.0.0.0
gravitino.server.webserver.httpPort = 8090

# Storage configuration
gravitino.server.auxiliary.services = iceberg-rest-service

# Iceberg catalog configuration
gravitino.iceberg-rest.catalog.backend = memory
gravitino.iceberg-rest.catalog.warehouse = s3a://lakehouse/
gravitino.iceberg-rest.catalog.io-impl = org.apache.iceberg.aws.s3.S3FileIO
gravitino.iceberg-rest.catalog.s3.endpoint = http://minio:9000
gravitino.iceberg-rest.catalog.s3.access-key-id = minioadmin
gravitino.iceberg-rest.catalog.s3.secret-access-key = minioadmin123
gravitino.iceberg-rest.catalog.s3.path-style-access = true

# Authentication
gravitino.authenticators = simple