name: Data Platform CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker images
      run: |
        docker-compose build
        
    - name: Start services
      run: |
        docker-compose up -d
        
    - name: Wait for services to be ready
      run: |
        echo "Waiting for services to start..."
        sleep 60
        
    - name: Test PostgreSQL connection
      run: |
        docker-compose exec -T postgres pg_isready -U hive -d hive_metastore
        
    - name: Test MinIO connection
      run: |
        curl -f http://localhost:9001 || exit 1
        
    - name: Test Spark Master UI
      run: |
        curl -f http://localhost:8080 || exit 1
        
    - name: Test Kafka brokers
      run: |
        docker-compose exec -T kafka-broker-1 kafka-topics.sh --bootstrap-server localhost:9092 --list
        
    - name: Test Hive Metastore
      run: |
        nc -z localhost 9083 || exit 1
        
    - name: Run integration tests
      run: |
        chmod +x ./scripts/integration-tests.sh
        ./scripts/integration-tests.sh
        
    - name: Cleanup
      if: always()
      run: |
        docker-compose down -v

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build-and-push:
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push Spark image
      uses: docker/build-push-action@v5
      with:
        context: ./docker/spark
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/spark:latest
          ghcr.io/${{ github.repository }}/spark:${{ github.sha }}
          
    - name: Build and push Hive image
      uses: docker/build-push-action@v5
      with:
        context: ./docker/hive
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/hive:latest
          ghcr.io/${{ github.repository }}/hive:${{ github.sha }}
          
    - name: Build and push Kafka Consumer image
      uses: docker/build-push-action@v5
      with:
        context: ./docker/kafka
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/kafka-consumer:latest
          ghcr.io/${{ github.repository }}/kafka-consumer:${{ github.sha }}