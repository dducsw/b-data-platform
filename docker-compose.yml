
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: postgres_db
      POSTGRES_MULTIPLE_DATABASES: iceberg_meta
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/rest/init_db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - data-platform

  # Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: schema-registry
    ports:
      - "8088:8081"
    depends_on:
      - kafka-broker-1
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-broker-1:29092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - data-platform
  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9002:9002"  # Changed from 9001 to 9002 for console
    volumes:
      - minio_data:/data
    
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    command: server /data --console-address ":9002" 
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - data-platform

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/lake --ignore-existing;
      /usr/bin/mc mb myminio/warehouse --ignore-existing;
      exit 0;
      "
    networks:
      - data-platform

  # Kafka with KRaft (Controller)
  kafka-controller:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka-controller
    user: "0:0"
    ports:
      - "9093:9093"
    environment:
      CLUSTER_ID: "2s0ES2gBSHGzDZOiZn54qg"    
      KAFKA_CLUSTER_ID: "2s0ES2gBSHGzDZOiZn54qg"
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT'
      KAFKA_LISTENERS: 'CONTROLLER://kafka-controller:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-controller:9093'
      KAFKA_PROCESS_ROLES: 'controller'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    volumes:
      - kafka_controller_data:/tmp/kraft-combined-logs
    networks:
      - data-platform

  # Kafka Broker 1
  kafka-broker-1:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka-broker-1
    user: "0:0"
    ports:
      - "9092:9092"
    depends_on:
      - kafka-controller
    environment:
      CLUSTER_ID: "2s0ES2gBSHGzDZOiZn54qg"    
      KAFKA_CLUSTER_ID: "2s0ES2gBSHGzDZOiZn54qg"
      KAFKA_NODE_ID: 2
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-broker-1:29092,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-broker-1:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-controller:9093'
      KAFKA_PROCESS_ROLES: 'broker'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    volumes:
      - kafka_broker1_data:/tmp/kraft-combined-logs
    networks:
      - data-platform

  # Kafka Broker 2
  kafka-broker-2:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka-broker-2
    user: "0:0"
    ports:
      - "9094:9094"
    depends_on:
      - kafka-controller
    environment:
      CLUSTER_ID: "2s0ES2gBSHGzDZOiZn54qg"    
      KAFKA_CLUSTER_ID: "2s0ES2gBSHGzDZOiZn54qg"
      KAFKA_NODE_ID: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-broker-2:29094,PLAINTEXT_HOST://0.0.0.0:9094'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-broker-2:29094,PLAINTEXT_HOST://localhost:9094'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-controller:9093'
      KAFKA_PROCESS_ROLES: 'broker'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
    volumes:
      - kafka_broker2_data:/tmp/kraft-combined-logs
    networks:
      - data-platform

  # Schema Registry

  # Kafka UI 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:29092
    networks:
      - data-platform


  # Spark Master
  spark-master:
    build: ./docker/spark
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - ICEBERG_VERSION=1.9.2
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - SPARK_JARS_PACKAGES=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.hadoop:hadoop-aws:3.3.4,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.5,org.apache.kafka:kafka-clients:3.4.1
    volumes:
      - ./data:/opt/spark/data
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./scripts:/opt/spark/scripts
    networks:
      - data-platform

  # Spark Worker 1
  spark-worker-1:
    build: ./docker/spark
    container_name: spark-worker-1
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - ICEBERG_VERSION=1.9.2
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - SPARK_JARS_PACKAGES=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.hadoop:hadoop-aws:3.3.4,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.5,org.apache.kafka:kafka-clients:3.4.1
    volumes:
      - ./data:/opt/spark/data
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./scripts:/opt/spark/scripts
    networks:
      - data-platform

  # Spark Worker 2
  spark-worker-2:
    build: ./docker/spark
    container_name: spark-worker-2
    ports:
      - "8082:8082"
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8082
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - ICEBERG_VERSION=1.9.2
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - SPARK_JARS_PACKAGES=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.2,org.apache.hadoop:hadoop-aws:3.3.4,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.5,org.apache.kafka:kafka-clients:3.4.1
    volumes:
      - ./data:/opt/spark/data
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./scripts:/opt/spark/scripts
    networks:
      - data-platform


  # Iceberg REST Catalog (compatible with Iceberg 1.9.2)
  iceberg-rest:
    build: ./docker/rest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3a://lake/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS__KEY__ID: minioadmin
      CATALOG_S3_SECRET__ACCESS__KEY: minioadmin123
      CATALOG_S3_PATH__STYLE__ACCESS: true
      # Thêm cấu hình metabackend Postgres
      CATALOG_METASTORE_IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_JDBC_URI: jdbc:postgresql://postgres:5432/iceberg_meta
      CATALOG_JDBC_USER: postgres
      CATALOG_JDBC_PASSWORD: postgres123
      AWS_REGION: us-east-1
    networks:
      - data-platform
    depends_on:
      - minio
      - postgres

volumes:
  minio_data:
  gravitino_data:
  kafka_controller_data:
  kafka_broker1_data:
  kafka_broker2_data:
  postgres_data:

networks:
  data-platform:
    driver: bridge
